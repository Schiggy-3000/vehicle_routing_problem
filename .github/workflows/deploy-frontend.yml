name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [master]
    paths: ["frontend/**", "sample_datasets/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Copy sample datasets into frontend
        run: cp -r sample_datasets/ frontend/sample_datasets/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/

      - id: deployment
        uses: actions/deploy-pages@v4
