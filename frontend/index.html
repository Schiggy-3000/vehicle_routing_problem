<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VRP Solver</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header>
  <h1>VRP Solver</h1>
  <select id="problem-type-select" title="Problem type">
    <option value="TSP">Traveling Salesman Problem (TSP)</option>
    <option value="VRP" selected>Vehicle Routing Problem (VRP)</option>
    <option value="CVRP">Capacitated VRP (CVRP)</option>
    <option value="PDP">VRP with Pickups &amp; Deliveries (PDP)</option>
    <option value="VRPTW">VRP with Time Windows (VRPTW)</option>
  </select>
</header>

<div id="app">

  <!-- ── Sidebar ─────────────────────────────────────────────────── -->
  <aside id="sidebar">

    <!-- Locations -->
    <div class="sidebar-section">
      <h2>Locations</h2>
      <ul id="location-list"></ul>
      <p id="hint-click-map">Click the map to add locations. First location becomes the depot.</p>
    </div>

    <!-- Problem-type-specific constraints (rendered by form-builder.js) -->
    <div id="constraint-section" class="sidebar-section" style="display:none;">
      <h2 id="constraint-title">Constraints</h2>
      <div id="constraint-content"></div>
    </div>

    <!-- Vehicles -->
    <div class="sidebar-section" id="vehicle-section">
      <h2>Vehicles</h2>
      <div id="vehicle-fields"></div>
    </div>

    <!-- Optimization objective -->
    <div class="sidebar-section" id="objective-section">
      <h2>Optimization Objective</h2>
      <div id="objective-fields">
        <label><input type="radio" name="objective" value="distance" checked /> Minimize Distance</label><br/>
        <label><input type="radio" name="objective" value="time" /> Minimize Travel Time</label>
      </div>
    </div>

    <!-- Load instance -->
    <div class="sidebar-section">
      <select id="instance-select" class="instance-select">
        <option value="" disabled selected>Load Instance…</option>
        <optgroup label="Demo">
          <option value="demo/swiss_demo">Swiss Demo — VRP (4 locations)</option>
        </optgroup>
        <optgroup label="Benchmarks">
          <option value="benchmarks/A-n32-k5">A-n32-k5 — CVRP (32 nodes)</option>
          <option value="benchmarks/C101_25">C101 — VRPTW (26 nodes)</option>
          <option value="benchmarks/lc101_small">lc101 — PDP (~20 nodes)</option>
        </optgroup>
        <optgroup label="Hand-Crafted">
          <option value="handcrafted/tsp_triangle">TSP Triangle (3 cities)</option>
          <option value="handcrafted/cvrp_forced_split">CVRP Forced Split (4 nodes)</option>
          <option value="handcrafted/vrptw_forced_order">VRPTW Forced Order (4 nodes)</option>
          <option value="handcrafted/pdp_precedence">PDP Precedence (5 nodes)</option>
          <option value="handcrafted/vrp_max_dist_split">VRP Max-Dist Split (5 nodes)</option>
        </optgroup>
        <optgroup label="TSPLIB">
          <option value="TSPLIB/burma14">burma14 — TSP (14 cities)</option>
          <option value="TSPLIB/ulysses16">ulysses16 — TSP (16 cities)</option>
          <option value="TSPLIB/ulysses22">ulysses22 — TSP (22 cities)</option>
          <option value="TSPLIB/gr96">gr96 — TSP (96 cities)</option>
        </optgroup>
      </select>
    </div>

    <!-- Actions -->
    <div id="actions">
      <button class="btn btn-primary" id="btn-solve" disabled>Solve</button>
      <button class="btn btn-outline" id="btn-reset">Reset</button>
      <div id="status-msg"></div>
    </div>

  </aside>

  <!-- ── Map + results ────────────────────────────────────────────── -->
  <div id="map-container">
    <div id="toast-container"></div>
    <div id="map"></div>
    <div id="results-panel">
      <h3>Solution</h3>
      <div id="results-content"></div>
    </div>
  </div>

</div>

<!-- Loading overlay -->
<div id="loader">
  <div class="loader-content">
    <div class="spinner"></div>
    <span>Solving…</span>
  </div>
</div>

<!-- Google Maps JS API — loaded dynamically by map.js -->
<script type="module" src="js/main.js"></script>

</body>
</html>
